<!DOCTYPE html>
<html lang="ru" class="h-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdHelp</title>
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="icon" href="static/img/favicon.png" type="image/png">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
        }

        .sidebar-section h3 {
            font-size: 1.5rem;
            border-bottom: 2px solid #dee2e6;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .tag-perl {
            color: #78909c;
        }

        .tag-python {
            color: #d32f2f;
        }

        .tag-django {
            color: #388e3c;
        }

        /* Карточка вопроса */
        .question-card {
            border: 2px solid #333;
            margin-bottom: 20px;
            padding: 15px;
        }

        .avatar-placeholder {
            width: 60px;
            height: 60px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
    </style>
</head>

<body>

    <header class="p-3 border-bottom bg-white">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between">
                <a href="#" class="fs-2 fw-bold text-dark text-decoration-none">CrowdHelp</a>

                <form class="col-12 col-lg-5 mb-3 mb-lg-0 me-lg-3 d-flex border rounded p-1">
                    <input type="search" class="form-control border-0 shadow-none" placeholder="Search">
                    <button class="btn btn-outline-success fw-bold me-3">ASK!</button>
                </form>
                <div class="d-flex align-items-center">
                    <div class="small">
                        <a href="#" class="text-decoration-none me-1">log in</a>
                        <a href="#" class="text-decoration-none">register</a>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container mt-4">
        <div class="row">

            <div class="col-lg-9">
                <h2 class="mb-4 fw-bold">New Question</h2>

                <form>
                    <div class="row mb-3 align-items-center">
                        <label class="col-sm-2 col-form-label fw-bold">Title</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control border-2 border-dark"
                                value="How to build a moon park ?">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-2 col-form-label fw-bold">Text</label>
                        <div class="col-sm-10">
                            <textarea class="form-control border-2 border-dark"
                                rows="8">Really, how ? Have no idea about it</textarea>
                        </div>
                    </div>

                    <div class="row mb-4 align-items-center">
                        <label class="col-sm-2 col-form-label fw-bold">Tags</label>
                        <div class="col-sm-10">
                            <input type="text" class="form-control border-2 border-dark" value="moon, park, puzzle">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-sm-2"></div>
                        <div class="col-sm-10">
                            <button type="submit"
                                class="btn btn-success fw-bold px-4 shadow-sm border-dark">ASK!</button>
                        </div>
                    </div>
                </form>
            </div>
            <aside class="col-lg-3 ps-lg-5">
                <div class="sidebar-section mb-5">
                    <h3>Popular Tags</h3>
                    <div class="d-flex flex-wrap gap-2 fw-bold">
                        <span class="tag-perl">perl</span>
                        <span class="tag-python">python</span>
                        <span class="text-secondary">TechnoPark</span>
                        <span class="text-danger">MySQL</span>
                        <span class="tag-django">django</span>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>Best Members</h3>
                    <ul class="list-unstyled lh-lg">
                        <li><a href="#" class="text-decoration-none">Mr. Freeman</a></li>
                        <li><a href="#" class="text-decoration-none text-primary">Dr. House</a></li>
                        <li><a href="#" class="text-decoration-none">Bender</a></li>
                        <li><a href="#" class="text-decoration-none">Queen Victoria</a></li>
                        <li><a href="#" class="text-decoration-none">V. Pupkin</a></li>
                    </ul>
                </div>
            </aside>

        </div>
    </main>



    <footer class="py-1 bg-light border-top mt-5">
        <div class="container text-center text-muted">
            Footer:)
        </div>
    </footer>

</body>

</html>
