<!DOCTYPE html>
<html lang="ru" class="h-100">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrowdHelp</title>
    <link rel="stylesheet" href="static/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="icon" href="static/img/favicon.png" type="image/png">
</head>

<body>

    <header class="p-3 border-bottom bg-white">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between">
                <a href="index.html" class="fs-2 fw-bold text-dark text-decoration-none">CrowdHelp</a>

                <form class="col-12 col-lg-5 mb-3 mb-lg-0 me-lg-3 d-flex border rounded p-1">
                    <input type="search" class="form-control border-0 shadow-none" placeholder="Search">
                    <a href="ask.html" class="btn btn-outline-success fw-bold me-3">ASK!</a>
                </form>

                <div class="d-flex align-items-center">
                    <div class="small">
                        <a href="login.html" class="text-decoration-none me-2 fw-bold">log in</a>
                        <a href="signup.html" class="text-decoration-none">register</a>
                    </div>
                </div>
            </div>
        </div>
    </header>


    <main class="container py-5">
        <div class="row">
            <div class="col-lg-9">
                <h2 class="mb-4 fw-bold">Registration</h2>

                <form>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Login</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control border-2 border-dark is-invalid">
                             <div class="invalid-feedback fw-bold">
                                Sorry, this login is already taken. Please choose another one.
                            </div>
                        </div>
                    </div>

                    
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Email</label>
                        <div class="col-sm-9">
                            <input type="email" class="form-control border-2 border-dark"
                                placeholder="dr.pepper@example.com">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">NickName</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control border-2 border-dark" placeholder="Dr. Pepper">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Password</label>
                        <div class="col-sm-9">
                            <input type="password" class="form-control border-2 border-dark">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Repeat password</label>
                        <div class="col-sm-9">
                            <input type="password" class="form-control border-2 border-dark">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Upload avatar</label>
                        <div class="col-sm-9">
                            <input class="form-control border-2 border-dark" type="file">
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-sm-3"></div>
                        <div class="col-sm-9">
                            <button type="submit" class="btn btn-dark px-5 fw-bold">Register!</button>
                        </div>
                    </div>
                </form>
            </div>

            <aside class="col-lg-3 ps-lg-5">
                <div class="sidebar-section mb-5">
                    <h3>Popular Tags</h3>
                    <div class="d-flex flex-wrap gap-2 fw-bold">
                        <span class="tag-perl">perl</span>
                        <span class="tag-python">python</span>
                        <span class="text-secondary">TechnoPark</span>
                        <span class="text-danger">MySQL</span>
                        <span class="tag-django">django</span>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>Best Members</h3>
                    <ul class="list-unstyled lh-lg">
                        <li><a href="#" class="text-decoration-none">Mr. Freeman</a></li>
                        <li><a href="#" class="text-decoration-none text-primary">Dr. House</a></li>
                        <li><a href="#" class="text-decoration-none">Bender</a></li>
                        <li><a href="#" class="text-decoration-none">Queen Victoria</a></li>
                        <li><a href="#" class="text-decoration-none">V. Pupkin</a></li>
                    </ul>
                </div>
            </aside>
        </div>
       
    </main>

<footer class="py-1 bg-light border-top mt-5">
        <div class="container text-center text-muted">
            Footer:)
        </div>
    </footer>
</body>
