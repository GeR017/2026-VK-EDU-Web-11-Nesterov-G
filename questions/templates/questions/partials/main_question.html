<section class="question-full">
                    <div class="row g-3">
                        <div class="col-auto text-center" style="min-width: 100px;">
                            <div class="avatar-placeholder mb-2">Avatar</div>
                            <div class="vote-widget">
                                <button class="vote-btn">▲</button>
                                <span class="vote-count">32</span>
                                <button class="vote-btn">▼</button>
                            </div>
                        </div>
                        <div class="col">
                            <h2 class="fw-bold mb-3">{{ question.title }}</h2>
                            <p class="fs-5">
                                {{ question.text }}
                            </p>
                            <div class="mt-3">
                                <span class="fw-bold">Tags:</span>
                                <a href="#" class="badge bg-light text-dark border text-decoration-none">moon</a>
                                <a href="#" class="badge bg-light text-dark border text-decoration-none">bender</a>
                            </div>
                        </div>
                    </div>
                </section>
