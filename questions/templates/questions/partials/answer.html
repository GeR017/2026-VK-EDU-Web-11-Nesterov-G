<div class="answer-card">
                        <div class="row g-3">
                            <div class="col-auto text-center" style="min-width: 100px;">
                                <div class="avatar-placeholder mb-2">Img</div>
                                <div class="vote-widget">
                                    <button class="vote-btn">▲</button>
                                    <span class="vote-count">12</span>
                                    <button class="vote-btn">▼</button>
                                </div>
                            </div>
                            <div class="col">
                                <p>{{ answer.text }}</p>
                                <div class="form-check mt-3">
                                    <input class="form-check-input correct-check" type="checkbox" id="correct1" checked>
                                    <label class="form-check-label ms-2 mt-1 fw-bold text-success"
                                        for="correct1">Correct!</label>
                                </div>
                            </div>
                        </div>
                    </div>
