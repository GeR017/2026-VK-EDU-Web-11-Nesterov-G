{% extends 'core/layout/base.html'%}


{% block content %}
<h2 class="mb-4 fw-bold">Registration</h2>

                <form>
                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Login</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control border-2 border-dark is-invalid">
                             <div class="invalid-feedback fw-bold">
                                Sorry, this login is already taken. Please choose another one.
                            </div>
                        </div>
                    </div>


                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Email</label>
                        <div class="col-sm-9">
                            <input type="email" class="form-control border-2 border-dark"
                                placeholder="dr.pepper@example.com">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">NickName</label>
                        <div class="col-sm-9">
                            <input type="text" class="form-control border-2 border-dark" placeholder="Dr. Pepper">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Password</label>
                        <div class="col-sm-9">
                            <input type="password" class="form-control border-2 border-dark">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Repeat password</label>
                        <div class="col-sm-9">
                            <input type="password" class="form-control border-2 border-dark">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-3 col-form-label fw-bold">Upload avatar</label>
                        <div class="col-sm-9">
                            <input class="form-control border-2 border-dark" type="file">
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-sm-3"></div>
                        <div class="col-sm-9">
                            <button type="submit" class="btn btn-dark px-5 fw-bold">Register!</button>
                        </div>
                    </div>
                </form>
{% endblock %}
